services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: esphome
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esphome"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: packages/editor/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/esphome
      CONCURRENT_JOBS: 2
      LOG_LEVEL: debug
      APP_EDITION: cloud
      PUBLIC_BASE_URL: http://localhost:3000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: esphome
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    tmpfs:
      - /tmp/esphome-builds:size=6g
    volumes:
      - platformio_data:/data/platformio
      - pio_cache:/data/pio-build-cache
      - ccache_data:/data/ccache

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do sleep 1; done;
      mc mb -p local/esphome || true;
      exit 0;
      "

volumes:
  postgres_data:
  platformio_data:
  pio_cache:
  ccache_data:
  minio_data:
