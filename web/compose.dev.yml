services:
  app:
    build:
      dockerfile: packages/editor/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@100.82.130.136:5432/esphome
      - CONCURRENT_JOBS=4
      - LOG_LEVEL=debug
    tmpfs:
      - /tmp/esphome-builds:size=8g
    volumes:
      - platformio_data:/data/platformio
      - pio_cache:/data/pio-build-cache
      - ccache_data:/data/ccache

volumes:
  platformio_data:
  pio_cache:
  ccache_data:
