# Hardware configuration for Seeed XIAO ESP32-S3 + ePaper Breakout Board.
# ePaper  ->  XIAO silkscreen -> GPIO
#   RST   ->  D0  -> GPIO1
#   CS    ->  D1  -> GPIO2
#   DC    ->  D3  -> GPIO4
#   BUSY  ->  D5  -> GPIO6 (idle-high, pull-up required)
#   SCK   ->  D8  -> GPIO7
#   MOSI  ->  D10 -> GPIO9

spi:
  id: epd_spi
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epd_display
    model: goodisplay-gdey042t81-4.2
    cs_pin: GPIO2
    dc_pin: GPIO4
    reset_pin:
      number: GPIO1
      inverted: false
    busy_pin:
      number: GPIO6
      inverted: false
    spi_id: epd_spi
    full_update_every: 255
    update_interval: never
    lambda: |-
      render_dashboard(it);
