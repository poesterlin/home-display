substitutions:
  device_name: eink-dashboard
  friendly_name: "E-Ink Dashboard"

packages:
  base: !include base.yaml
  fonts: !include fonts.yaml
  hardware: !include hardware.yaml

esphome:
  includes:
    - includes/ui_types.h
    - includes/ui_state.h
    - includes/ui_invalidation.h
    - includes/ui_widget_base.h
    - includes/ui_clock_widget.h
    - includes/ui_departures_widget.h
    - includes/ui_app.h
    - includes/dashboard.h
  on_boot:
    priority: 600
    then:
      - delay: 5s
      - lambda: |-
          g_app.fetch_departures();
          g_app.poll_widgets();
          if (UiInvalidation::needs_redraw())
            id(epd_display).update();

interval:
  - interval: 60s
    then:
      - lambda: |-
          g_app.fetch_departures();
          g_app.poll_widgets();
          if (UiInvalidation::needs_redraw())
            id(epd_display).update();

  - interval: 10s
    then:
      - lambda: |-
          g_app.poll_widgets();
          if (UiInvalidation::needs_redraw())
            id(epd_display).update();
