# === PRODUCTION TOUCH HANDLING ===

interval:
  - interval: 16ms
    then:
      - lambda: |- 
          // Static variables to store last touch coordinates
          static int last_x = 0;
          static int last_y = 0;
          
          uint8_t start_reg = 0x00;
          uint8_t buf[16];
          
          if (id(touch_i2c)->write(0x1A, &start_reg, 1, true) != i2c::ERROR_OK) return;
          if (id(touch_i2c)->read(0x1A, buf, 16) != i2c::ERROR_OK) return;
          
          uint8_t status = buf[0];
          bool touched = (status == 0x06 || status == 0x10);
          
          if (touched) {
            // Hybrid Decoding (Winning Mapping)
            uint16_t x_raw = ((buf[1] & 0x0F) << 8) | buf[2];
            uint16_t y_raw = (buf[2] << 8) | buf[3];
            
            // Calibration (X: 0-3900 -> 0-240, Y: 0-5100 -> 0-320)
            int x = (int)((float)x_raw * 240.0f / 3900.0f);
            int y = (int)((float)y_raw * 320.0f / 5100.0f);
            
            // Clamp
            if (x < 0) x = 0; if (x > 239) x = 239;
            if (y < 0) y = 0; if (y > 319) y = 319;
            
            // Store for release event
            last_x = x;
            last_y = y;
            
            ESP_LOGI("touch", "TOUCH at X=%d, Y=%d (raw: X=%d, Y=%d)", x, y, x_raw, y_raw);
            
            // Delegate to Touch Handler
            TouchHandler::handleTouch(x, y, true);
          } else {
            // Release - pass last known coordinates for proper gesture detection
            // ESP_LOGI("touch", "TOUCH RELEASE");
            TouchHandler::handleTouch(last_x, last_y, false);
          }

          // Sound handling moved here for lower latency (16ms vs 50ms)
          if (gPendingSwipeSound) {
            gPendingSwipeSound = false;
            id(display_speaker).set_volume(0.7);
            id(swipe_buzzer).play("click:d=32,o=4,b=100:c");
          }
          if (gPendingTapSound) {
            gPendingTapSound = false;
            id(display_speaker).set_volume(0.7);
            id(swipe_buzzer).play("tap:d=32,o=4,b=100:e");
          }
          if (gPendingNotificationSound) {
            gPendingNotificationSound = false;
            id(display_speaker).set_volume(0.9);
            id(swipe_buzzer).play("notif:d=16,o=4,b=100:g,e");
          }

  - interval: 1s
    then:
      - lambda: |- 
          // Auto-return to main dashboard after 30s of inactivity
          if (gState.currentView != VIEW_MAIN_DASHBOARD && (millis() - gState.lastTouchTime) > 30000) {
            goBack();
          }
          // Also reset main page to 0 if idle
          if (gState.currentView == VIEW_MAIN_DASHBOARD && gState.mainPageIndex != 0 && (millis() - gState.lastTouchTime) > 30000) {
            setPage(0);
          }

  - interval: 50ms
    then:
      - lambda: |-
          // To-Do Actions
          if (gState.todoActionRequested) {
            gState.todoActionRequested = false;
            gState.todoActionLoading = true;
            gState.todoActionStartTime = millis();
            if (gState.todoViewTab == 0) {
              id(call_todo_complete).execute("todo.shopping_list", gState.todoActionSummary);
            } else {
              id(call_todo_complete).execute("todo.todo", gState.todoActionSummary);
            }
          }

          if (gState.vacuumActionRequested) {
            gState.vacuumActionRequested = false;
            if (gState.vacuumCleaning) id(call_vacuum_stop).execute();
            else id(call_vacuum_start).execute();
          }
          
          // Light Actions
          if (gState.lightStehlampe.actionRequested) {
            gState.lightStehlampe.actionRequested = false;
            id(toggle_stehlampe).execute();
          }
          if (gState.lightWohnzimmer.actionRequested) {
            gState.lightWohnzimmer.actionRequested = false;
            id(toggle_wohnzimmer).execute();
          }
          if (gState.lightKleineLampe.actionRequested) {
            gState.lightKleineLampe.actionRequested = false;
            id(toggle_kleine_lampe).execute();
          }
          if (gState.lightWLED.actionRequested) {
            gState.lightWLED.actionRequested = false;
            id(toggle_wled).execute();
          }
          if (gState.lightStehlampeOben.actionRequested) {
            gState.lightStehlampeOben.actionRequested = false;
            id(toggle_stehlampe_oben).execute();
          }
          if (gState.lightKamera.actionRequested) {
            gState.lightKamera.actionRequested = false;
            id(toggle_kamera).execute();
          }
          if (gState.lightOffice.actionRequested) {
            gState.lightOffice.actionRequested = false;
            id(toggle_office).execute();
          }
          if (gState.lightGrosseLED.actionRequested) {
            gState.lightGrosseLED.actionRequested = false;
            id(toggle_grosse_led).execute();
          }

          // Notification Actions
          if (gState.notificationActionRequested) {
            ESP_LOGI("main", "Notification action requested, executing script");
            gState.notificationActionRequested = false;
            id(clear_notification).execute();
          }

          // Reset To-Do Loading after timeout
          if (gState.todoActionLoading && (millis() - gState.todoActionStartTime > 5000)) {
            gState.todoActionLoading = false;
          }

script:
  - id: call_vacuum_start
    then:
      - homeassistant.service:
          service: vacuum.start
          data:
            entity_id: vacuum.roborock_qrevo_curv_series
  - id: call_vacuum_stop
    then:
      - homeassistant.service:
          service: vacuum.return_to_base
          data:
            entity_id: vacuum.roborock_qrevo_curv_series

  - id: toggle_stehlampe
    then:
      - homeassistant.service:
          service: switch.toggle
          data:
            entity_id: switch.stehlampe_switch
  - id: toggle_wohnzimmer
    then:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: light.wohnzimmer_licht_light
  - id: toggle_kleine_lampe
    then:
      - homeassistant.service:
          service: switch.toggle
          data:
            entity_id: switch.kleine_lampe_switch
  - id: toggle_wled
    then:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: light.wled
  - id: toggle_stehlampe_oben
    then:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: light.stehlampe_oben
  - id: toggle_kamera
    then:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: light.innr_rf_262_light
  - id: toggle_office
    then:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: light.schlafzimmer_licht_light
  - id: toggle_grosse_led
    then:
      - homeassistant.service:
          service: switch.toggle
          data:
            entity_id: switch.grosse_led_switch

  - id: clear_notification
    then:
      - lambda: ESP_LOGI("main", "Clearing notification entities in HA");
      - homeassistant.service:
          service: input_text.set_value
          data:
            entity_id: input_text.display_notification
            value: ""
      - homeassistant.service:
          service: input_text.set_value
          data:
            entity_id: input_text.display_notification_title
            value: ""
      - homeassistant.service:
          service: input_select.select_option
          data:
            entity_id: input_select.display_notification_severity
            option: "info"

  - id: call_todo_complete
    parameters:
      list_id: string
      item_summary: string
    then:
      - homeassistant.service:
          service: todo.update_item
          data:
            entity_id: !lambda 'return list_id;'
            item: !lambda 'return item_summary;'
            status: completed
